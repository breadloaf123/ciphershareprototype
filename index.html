<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CipherShare - O2O Affiliate & Anti-Fraud Engine</title>
  <meta name="description" content="Transform every customer into a micro-influencer with instant commission rewards">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwindcss.config = {
      theme: {
        extend: {
          colors: {
            background: '#1a1a2e',
            foreground: '#f5f5f5',
            card: '#252542',
            'card-foreground': '#f5f5f5',
            primary: '#4ade80',
            'primary-foreground': '#1a1a2e',
            secondary: '#2d2d4a',
            'secondary-foreground': '#f5f5f5',
            muted: '#2d2d4a',
            'muted-foreground': '#a1a1aa',
            border: '#3d3d5c',
            destructive: '#ef4444',
          }
        }
      }
    }
  </script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    
    * {
      font-family: 'Inter', sans-serif;
    }
    
    body {
      background: #1a1a2e;
      min-height: 100vh;
      overflow: hidden;
    }
    
    .phone-shadow {
      box-shadow: 0 0 60px rgba(74, 222, 128, 0.15), 0 0 100px rgba(74, 222, 128, 0.05);
    }
    
    .glow {
      background: radial-gradient(circle at 50% 50%, rgba(74, 222, 128, 0.1) 0%, transparent 50%);
    }
    
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }
    
    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }
    
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.5; }
    }
    
    @keyframes scan {
      0% { top: 0; }
      100% { top: calc(100% - 4px); }
    }
    
    .scan-line {
      animation: scan 2s ease-in-out infinite;
    }
    
    @keyframes bars {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }
    
    .bar-1 { animation: bars 1s ease-in-out infinite; }
    .bar-2 { animation: bars 1s ease-in-out infinite 0.2s; }
    .bar-3 { animation: bars 1s ease-in-out infinite 0.4s; }
    
    .fade-in {
      animation: fadeIn 0.3s ease-out;
    }
    
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    @keyframes fingerprint {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }
    
    .fingerprint-pulse {
      animation: fingerprint 1s ease-in-out infinite;
    }
  </style>
</head>
<body class="flex items-center justify-center">
  <!-- Background Glow -->
  <div class="fixed inset-0 glow pointer-events-none"></div>
  
  <!-- Logo -->
  <div class="fixed top-6 left-6 flex items-center gap-2 z-10">
    <div class="w-10 h-10 rounded-xl bg-primary/20 flex items-center justify-center">
      <svg class="w-6 h-6 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>
    </div>
    <span class="text-xl font-bold text-foreground">CipherShare</span>
  </div>

  <!-- Phone Container -->
  <div id="phone" class="relative w-[320px] h-[680px] bg-card rounded-[2.5rem] border-4 border-secondary phone-shadow overflow-hidden">
    <!-- Notch -->
    <div class="absolute top-0 left-1/2 -translate-x-1/2 w-32 h-7 bg-background rounded-b-2xl z-20"></div>
    
    <!-- Status Bar -->
    <div class="absolute top-2 left-0 right-0 flex justify-between items-center px-8 z-10">
      <span class="text-xs text-foreground font-medium">9:41</span>
      <div class="flex items-center gap-1">
        <svg class="w-4 h-4 text-foreground" fill="currentColor" viewBox="0 0 24 24">
          <path d="M12 3C6.95 3 3 6.95 3 12s3.95 9 9 9c.46 0 .92-.04 1.37-.1a1 1 0 00-.37-1.97c-.33.05-.66.07-1 .07-3.86 0-7-3.14-7-7s3.14-7 7-7 7 3.14 7 7c0 .34-.02.67-.07 1a1 1 0 001.97.37c.06-.45.1-.91.1-1.37 0-5.05-3.95-9-9-9z"/>
        </svg>
        <svg class="w-4 h-4 text-foreground" fill="currentColor" viewBox="0 0 24 24">
          <path d="M17 4h-3V2h-4v2H7v18h10V4z"/>
        </svg>
      </div>
    </div>
    
    <!-- Screen Content -->
    <div id="screen-content" class="absolute top-10 left-0 right-0 bottom-0 overflow-y-auto scrollbar-hide pb-20">
      <!-- Content will be injected here -->
    </div>
    
    <!-- Bottom Navigation -->
    <div class="absolute bottom-0 left-0 right-0 bg-card/95 backdrop-blur-sm border-t border-border px-4 py-3 z-20">
      <div class="flex items-center justify-around">
        <button onclick="navigateTo('home')" class="nav-btn flex flex-col items-center gap-1" data-screen="home">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
          </svg>
          <span class="text-[10px]">Home</span>
        </button>
        <button onclick="navigateTo('products')" class="nav-btn flex flex-col items-center gap-1" data-screen="products">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/>
          </svg>
          <span class="text-[10px]">Products</span>
        </button>
        <button onclick="navigateTo('scan')" class="relative -top-4 w-14 h-14 bg-primary rounded-2xl flex items-center justify-center shadow-lg shadow-primary/30">
          <svg class="w-7 h-7 text-primary-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h2M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
          </svg>
        </button>
        <button onclick="navigateTo('rewards')" class="nav-btn flex flex-col items-center gap-1" data-screen="rewards">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/>
          </svg>
          <span class="text-[10px]">Rewards</span>
        </button>
        <button onclick="navigateTo('profile')" class="nav-btn flex flex-col items-center gap-1" data-screen="profile">
          <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
          </svg>
          <span class="text-[10px]">Profile</span>
        </button>
      </div>
    </div>
    
    <!-- Toast Notification -->
    <div id="toast" class="absolute bottom-24 left-4 right-4 bg-secondary border border-border text-foreground px-4 py-3 rounded-xl text-sm font-medium text-center shadow-lg hidden z-30"></div>
    
    <!-- Biometric Modal -->
    <div id="biometric-modal" class="absolute inset-0 bg-background/80 backdrop-blur-sm flex items-center justify-center z-50 rounded-[2.5rem] hidden">
      <div class="bg-card border border-border rounded-2xl p-6 mx-8 text-center">
        <div id="biometric-icon" class="w-20 h-20 mx-auto rounded-full flex items-center justify-center mb-4 bg-secondary">
          <svg class="w-10 h-10 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/>
          </svg>
        </div>
        <h3 id="biometric-title" class="font-bold text-foreground text-lg mb-1">Touch Sensor</h3>
        <p id="biometric-text" class="text-sm text-muted-foreground">Place your finger on the sensor</p>
      </div>
    </div>
  </div>

  <script>
    // App State
    let state = {
      screen: 'home',
      screenHistory: [],
      totalPoints: 2450,
      notifications: 3,
      selectedProduct: null,
      copied: false,
      trustScore: 94,
      isDeviceVerified: true,
      isBiometricEnabled: true,
      searchQuery: '',
      selectedCategory: 'all',
      securityAlerts: [
        { id: 1, type: 'info', message: 'New device login blocked from Bangkok', time: '2 hours ago', resolved: false },
        { id: 2, type: 'warning', message: 'Unusual activity pattern detected', time: '1 day ago', resolved: true },
        { id: 3, type: 'success', message: '2FA verification successful', time: '3 days ago', resolved: true },
      ],
      rewards: [
        { id: 1, name: "7-Eleven Voucher", points: 500, claimed: false },
        { id: 2, name: "Grab Food ฿50", points: 800, claimed: false },
        { id: 3, name: "Lotus's Discount", points: 300, claimed: false },
        { id: 4, name: "True Money ฿100", points: 1500, claimed: false },
      ],
      referrals: [
        { id: 1, name: "Som", status: "purchased", amount: 150 },
        { id: 2, name: "Nong", status: "clicked", amount: 0 },
        { id: 3, name: "Pla", status: "purchased", amount: 89 },
        { id: 4, name: "Kai", status: "pending", amount: 0 },
      ]
    };

    const products = [
      { id: 1, name: "Snack Box", price: 49, points: 25, category: "food", emoji: "📦" },
      { id: 2, name: "Energy Drink", price: 35, points: 18, category: "drinks", emoji: "⚡" },
      { id: 3, name: "Instant Noodles", price: 15, points: 8, category: "food", emoji: "🍜" },
      { id: 4, name: "Phone Charger", price: 199, points: 100, category: "electronics", emoji: "🔌" },
      { id: 5, name: "Coffee 3-in-1", price: 25, points: 12, category: "drinks", emoji: "☕" },
      { id: 6, name: "Face Mask", price: 89, points: 45, category: "health", emoji: "😷" },
    ];

    // Generate QR Pattern
    function generateQRPattern(seed) {
      const pattern = [];
      for (let i = 0; i < 81; i++) {
        const isCorner = (i < 21 && (i % 9 < 3)) || (i < 21 && (i % 9 > 5)) || (i > 53 && i < 75 && (i % 9 < 3));
        if (isCorner) {
          const row = Math.floor(i / 9);
          const col = i % 9;
          const inCornerOuter = (row < 3 && col < 3) || (row < 3 && col > 5) || (row > 5 && row < 9 && col < 3);
          const inCornerInner = (row === 1 && (col === 1 || col === 7)) || (row === 7 && col === 1);
          pattern.push(inCornerOuter && !inCornerInner);
        } else {
          pattern.push(((seed * (i + 1) * 17) % 100) > 45);
        }
      }
      return pattern;
    }

    // Navigation
    function navigateTo(screen, addToHistory = true) {
      if (addToHistory && state.screen !== screen) {
        state.screenHistory.push(state.screen);
      }
      state.screen = screen;
      render();
      updateNavHighlight();
    }

    function goBack() {
      if (state.screenHistory.length > 0) {
        state.screen = state.screenHistory.pop();
        render();
        updateNavHighlight();
      }
    }

    function updateNavHighlight() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const screen = btn.dataset.screen;
        if (screen === state.screen || (state.screen === 'share' && screen === 'products') || (state.screen === 'security' && screen === 'profile') || (state.screen === 'network' && screen === 'home')) {
          btn.classList.add('text-primary');
          btn.classList.remove('text-muted-foreground');
        } else {
          btn.classList.remove('text-primary');
          btn.classList.add('text-muted-foreground');
        }
      });
    }

    // Toast
    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    // Copy Link
    function copyLink() {
      state.copied = true;
      state.totalPoints += 10;
      showToast('+10 Points for sharing!');
      render();
      setTimeout(() => {
        state.copied = false;
        render();
      }, 2000);
    }

    // Claim Reward
    function claimReward(id) {
      const reward = state.rewards.find(r => r.id === id);
      if (reward && !reward.claimed && state.totalPoints >= reward.points) {
        reward.claimed = true;
        state.totalPoints -= reward.points;
        showToast(`Claimed ${reward.name}!`);
        render();
      }
    }

    // Resolve Alert
    function resolveAlert(id) {
      const alert = state.securityAlerts.find(a => a.id === id);
      if (alert) {
        alert.resolved = true;
        state.trustScore = Math.min(100, state.trustScore + 2);
        showToast('Alert resolved');
        render();
      }
    }

    // Toggle Biometric
    function toggleBiometric() {
      const modal = document.getElementById('biometric-modal');
      const icon = document.getElementById('biometric-icon');
      const title = document.getElementById('biometric-title');
      const text = document.getElementById('biometric-text');
      
      modal.classList.remove('hidden');
      icon.classList.add('fingerprint-pulse');
      icon.classList.remove('bg-primary/20');
      icon.classList.add('bg-secondary');
      icon.innerHTML = `<svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/>
      </svg>`;
      title.textContent = 'Verifying...';
      text.textContent = 'Place your finger on the sensor';
      
      setTimeout(() => {
        icon.classList.remove('fingerprint-pulse');
        icon.classList.add('bg-primary/20');
        icon.classList.remove('bg-secondary');
        icon.innerHTML = `<svg class="w-10 h-10 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>`;
        title.textContent = 'Verified';
        text.textContent = 'Biometric authentication successful';
        
        setTimeout(() => {
          modal.classList.add('hidden');
          state.isBiometricEnabled = !state.isBiometricEnabled;
          showToast(state.isBiometricEnabled ? 'Biometric enabled' : 'Biometric disabled');
          render();
        }, 800);
      }, 1500);
    }

    // Select Product
    function selectProduct(product) {
      state.selectedProduct = product;
      navigateTo('share');
    }

    // Render Screen
    function render() {
      const content = document.getElementById('screen-content');
      
      switch(state.screen) {
        case 'home':
          content.innerHTML = renderHome();
          break;
        case 'products':
          content.innerHTML = renderProducts();
          break;
        case 'share':
          content.innerHTML = renderShare();
          break;
        case 'rewards':
          content.innerHTML = renderRewards();
          break;
        case 'network':
          content.innerHTML = renderNetwork();
          break;
        case 'profile':
          content.innerHTML = renderProfile();
          break;
        case 'security':
          content.innerHTML = renderSecurity();
          break;
        case 'scan':
          content.innerHTML = renderScan();
          break;
      }
    }

    // Render Home
    function renderHome() {
      return `
        <div class="px-5 fade-in">
          <!-- Header -->
          <div class="flex items-center justify-between mb-5">
            <div>
              <p class="text-sm text-muted-foreground">Welcome back</p>
              <h1 class="text-xl font-bold text-foreground">CipherShare User</h1>
            </div>
            <button onclick="state.notifications=0;showToast('Notifications cleared');render();" class="relative p-2 rounded-full bg-secondary/50">
              <svg class="w-5 h-5 text-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/>
              </svg>
              ${state.notifications > 0 ? `<span class="absolute -top-1 -right-1 w-5 h-5 bg-primary rounded-full text-xs font-bold text-primary-foreground flex items-center justify-center">${state.notifications}</span>` : ''}
            </button>
          </div>

          <!-- Points Card -->
          <div class="bg-gradient-to-br from-primary/20 to-primary/5 border border-primary/30 rounded-2xl p-5 mb-5">
            <div class="flex items-center justify-between mb-3">
              <div class="flex items-center gap-2">
                <div class="w-8 h-8 rounded-lg bg-primary/20 flex items-center justify-center">
                  <svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/>
                  </svg>
                </div>
                <span class="text-sm text-muted-foreground">Total Points</span>
              </div>
              <svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/>
              </svg>
            </div>
            <p class="text-4xl font-bold text-foreground mb-1">${state.totalPoints.toLocaleString()}</p>
            <p class="text-sm text-primary flex items-center gap-1">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/>
              </svg>
              +350 this week
            </p>
          </div>

          <!-- Quick Actions -->
          <div class="grid grid-cols-4 gap-2 mb-5">
            ${[
              { icon: 'bag', label: 'Products', screen: 'products' },
              { icon: 'gift', label: 'Rewards', screen: 'rewards' },
              { icon: 'shield', label: 'Security', screen: 'security' },
              { icon: 'users', label: 'Network', screen: 'network' },
            ].map((item, i) => `
              <button onclick="navigateTo('${item.screen}')" class="flex flex-col items-center gap-2 p-3 bg-secondary/30 rounded-xl border border-border hover:border-primary/30 transition-colors">
                ${getIcon(item.icon)}
                <span class="text-[10px] text-muted-foreground">${item.label}</span>
              </button>
            `).join('')}
          </div>

          <!-- Recent Activity -->
          <div class="flex items-center justify-between mb-3">
            <h2 class="font-semibold text-foreground">Recent Referrals</h2>
            <button onclick="navigateTo('network')" class="text-xs text-primary">View All</button>
          </div>
          <div class="space-y-2">
            ${state.referrals.slice(0, 3).map((referral, i) => `
              <div class="flex items-center gap-3 p-3 bg-secondary/30 rounded-xl border border-border">
                <div class="w-10 h-10 rounded-full bg-primary/20 flex items-center justify-center">
                  <span class="text-sm font-bold text-primary">${referral.name[0]}</span>
                </div>
                <div class="flex-1">
                  <p class="font-medium text-foreground text-sm">${referral.name}</p>
                  <p class="text-xs text-muted-foreground capitalize">${referral.status}</p>
                </div>
                ${referral.amount > 0 ? `<span class="text-sm font-bold text-primary">+฿${referral.amount}</span>` : ''}
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // Render Products
    function renderProducts() {
      const filtered = products.filter(p => {
        const matchesSearch = p.name.toLowerCase().includes(state.searchQuery.toLowerCase());
        const matchesCategory = state.selectedCategory === 'all' || p.category === state.selectedCategory;
        return matchesSearch && matchesCategory;
      });

      return `
        <div class="px-5 fade-in">
          <!-- Header -->
          <div class="flex items-center gap-3 mb-4">
            <button onclick="goBack()" class="p-2 rounded-full bg-secondary/50 text-foreground">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
            </button>
            <h2 class="text-lg font-bold text-foreground">Share & Earn</h2>
          </div>

          <!-- Search -->
          <div class="relative mb-4">
            <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
            </svg>
            <input 
              type="text" 
              placeholder="Search products..."
              value="${state.searchQuery}"
              oninput="state.searchQuery=this.value;render();"

          <h3 class="text-sm font-semibold text-foreground mb-3 flex items-center gap-2">
            <svg class="w-4 h-4 text-muted-foreground" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20.618 5.984A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016zM12 9v2m0 4h.01"/>
            </svg>
            Recent Alerts
          </h3>
          <div class="space-y-2">
            ${state.securityAlerts.map(alert => `
              <div class="p-3 rounded-xl border ${alert.resolved ? 'bg-secondary/20 border-border' : 'bg-destructive/10 border-destructive/30'}">
                <div class="flex items-start gap-3">
                  <div class="w-8 h-8 rounded-lg flex items-center justify-center ${alert.resolved ? 'bg-primary/20' : 'bg-destructive/20'}">
                    ${alert.resolved 
                      ? `<svg class="w-4 h-4 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>`
                      : `<svg class="w-4 h-4 text-destructive" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>`
                    }
                  </div>
                  <div class="flex-1">
                    <p class="text-sm text-foreground">${alert.message}</p>
                    <p class="text-xs text-muted-foreground mt-0.5">${alert.time}</p>
                  </div>
                  ${!alert.resolved ? `<button onclick="resolveAlert(${alert.id})" class="text-xs text-primary font-medium">Resolve</button>` : ''}
                </div>
              </div>
            `).join('')}
          </div>
        </div>
      `;
    }

    // Render Scan
    function renderScan() {
      return `
        <div class="px-5 fade-in h-full flex flex-col">
          <!-- Header -->
          <div class="flex items-center gap-3 mb-4">
            <button onclick="goBack()" class="p-2 rounded-full bg-secondary/50 text-foreground">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/>
              </svg>
            </button>
            <h2 class="text-lg font-bold text-foreground">Scan QR Code</h2>
          </div>

          <!-- Scanner -->
          <div class="flex-1 flex flex-col items-center justify-center">
            <div class="relative w-56 h-56 mb-6">
              <div class="absolute inset-0 border-2 border-primary/30 rounded-2xl"></div>
              <div class="absolute top-0 left-0 w-8 h-8 border-t-4 border-l-4 border-primary rounded-tl-xl"></div>
              <div class="absolute top-0 right-0 w-8 h-8 border-t-4 border-r-4 border-primary rounded-tr-xl"></div>
              <div class="absolute bottom-0 left-0 w-8 h-8 border-b-4 border-l-4 border-primary rounded-bl-xl"></div>
              <div class="absolute bottom-0 right-0 w-8 h-8 border-b-4 border-r-4 border-primary rounded-br-xl"></div>
              <div class="absolute left-2 right-2 h-1 bg-gradient-to-r from-transparent via-primary to-transparent scan-line"></div>
              <div class="absolute inset-0 flex items-center justify-center">
                <svg class="w-12 h-12 text-primary/30" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h2M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/>
                </svg>
              </div>
            </div>
            <p class="text-muted-foreground text-center mb-2">Position the QR code within the frame</p>
            <p class="text-xs text-muted-foreground text-center">Scan at any 7-Eleven, Lotus's, or partner store</p>
          </div>
        </div>
      `;
    }

    // Helper: Get Icon
    function getIcon(name) {
      const icons = {
        bag: `<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>`,
        gift: `<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>`,
        shield: `<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>`,
        users: `<svg class="w-5 h-5 text-primary" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4.354a4 4 0 110 5.292M15 21H3v-1a6 6 0 0112 0v1zm0 0h6v-1a6 6 0 00-9-5.197M13 7a4 4 0 11-8 0 4 4 0 018 0z"/></svg>`,
      };
      return icons[name] || '';
    }

    // Initialize
    document.addEventListener('DOMContentLoaded', () => {
      render();
      updateNavHighlight();
    });
  </script>
</body>
</html>
