<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>CipherShare - O2O Affiliate & Anti-Fraud Engine</title>
  <meta name="description" content="Transform every customer into a micro-influencer with instant commission rewards">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    :root {
      --bg: #0f0f1a;
      --card: #1a1a2e;
      --card-hover: #222240;
      --border: #2a2a4a;
      --primary: #4ade80;
      --primary-dim: rgba(74, 222, 128, 0.2);
      --primary-glow: rgba(74, 222, 128, 0.15);
      --text: #f5f5f5;
      --text-muted: #9ca3af;
      --danger: #ef4444;
      --danger-dim: rgba(239, 68, 68, 0.2);
    }

    body {
      background: var(--bg);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      overflow: hidden;
    }

    .glow {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle at 50% 50%, var(--primary-glow) 0%, transparent 50%);
      pointer-events: none;
    }

    .logo {
      position: fixed;
      top: 24px;
      left: 24px;
      display: flex;
      align-items: center;
      gap: 10px;
      z-index: 10;
    }

    .logo-icon {
      width: 40px;
      height: 40px;
      background: var(--primary-dim);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo-icon svg {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }

    .logo-text {
      font-size: 20px;
      font-weight: 700;
      color: var(--text);
    }

    .phone {
      position: relative;
      width: 320px;
      height: 680px;
      background: var(--card);
      border-radius: 40px;
      border: 4px solid var(--border);
      box-shadow: 0 0 60px var(--primary-glow), 0 0 100px rgba(74, 222, 128, 0.05);
      overflow: hidden;
    }

    .notch {
      position: absolute;
      top: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 120px;
      height: 28px;
      background: var(--bg);
      border-radius: 0 0 16px 16px;
      z-index: 20;
    }

    .status-bar {
      position: absolute;
      top: 8px;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 32px;
      z-index: 10;
    }

    .status-bar span {
      font-size: 12px;
      font-weight: 600;
    }

    .status-icons {
      display: flex;
      gap: 4px;
    }

    .status-icons svg {
      width: 16px;
      height: 16px;
    }

    .screen {
      position: absolute;
      top: 40px;
      left: 0;
      right: 0;
      bottom: 0;
      overflow-y: auto;
      padding-bottom: 80px;
      scrollbar-width: none;
    }

    .screen::-webkit-scrollbar {
      display: none;
    }

    .screen-content {
      padding: 0 20px;
      animation: fadeIn 0.3s ease;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .bottom-nav {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      background: rgba(26, 26, 46, 0.95);
      backdrop-filter: blur(10px);
      border-top: 1px solid var(--border);
      padding: 12px 16px;
      z-index: 20;
    }

    .nav-items {
      display: flex;
      align-items: center;
      justify-content: space-around;
    }

    .nav-btn {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      transition: color 0.2s;
    }

    .nav-btn.active {
      color: var(--primary);
    }

    .nav-btn svg {
      width: 20px;
      height: 20px;
    }

    .nav-btn span {
      font-size: 10px;
    }

    .scan-btn {
      position: relative;
      top: -16px;
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 16px;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 4px 20px rgba(74, 222, 128, 0.3);
      transition: transform 0.2s;
    }

    .scan-btn:active {
      transform: scale(0.95);
    }

    .scan-btn svg {
      width: 28px;
      height: 28px;
      color: var(--bg);
    }

    /* Common Components */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .header-back {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .back-btn {
      width: 36px;
      height: 36px;
      background: rgba(42, 42, 74, 0.5);
      border-radius: 50%;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text);
      transition: background 0.2s;
    }

    .back-btn:active {
      background: var(--border);
    }

    .back-btn svg {
      width: 20px;
      height: 20px;
    }

    .header h2 {
      font-size: 18px;
      font-weight: 700;
    }

    .card {
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .card-primary {
      background: linear-gradient(135deg, var(--primary-dim) 0%, rgba(74, 222, 128, 0.05) 100%);
      border-color: rgba(74, 222, 128, 0.3);
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 12px 20px;
      border-radius: 12px;
      border: none;
      cursor: pointer;
      font-weight: 600;
      font-size: 14px;
      transition: all 0.2s;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn-primary {
      background: var(--primary);
      color: var(--bg);
    }

    .btn-secondary {
      background: var(--card-hover);
      color: var(--text);
      border: 1px solid var(--border);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
    }

    .badge-primary {
      background: var(--primary-dim);
      color: var(--primary);
    }

    .badge-danger {
      background: var(--danger-dim);
      color: var(--danger);
    }

    /* Points Card */
    .points-card {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .points-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .points-label {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .points-icon {
      width: 32px;
      height: 32px;
      background: var(--primary-dim);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .points-icon svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
    }

    .points-label span {
      font-size: 14px;
      color: var(--text-muted);
    }

    .points-value {
      font-size: 36px;
      font-weight: 700;
    }

    .points-change {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 14px;
      color: var(--primary);
    }

    .points-change svg {
      width: 16px;
      height: 16px;
    }

    /* Quick Actions */
    .quick-actions {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .quick-action {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .quick-action:active {
      background: var(--card-hover);
      border-color: rgba(74, 222, 128, 0.3);
    }

    .quick-action svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    .quick-action span {
      font-size: 10px;
      color: var(--text-muted);
    }

    /* Referral Item */
    .referral-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .referral-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px;
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
    }

    .referral-avatar {
      width: 40px;
      height: 40px;
      background: var(--primary-dim);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      color: var(--primary);
    }

    .referral-info {
      flex: 1;
    }

    .referral-name {
      font-weight: 600;
      font-size: 14px;
    }

    .referral-status {
      font-size: 12px;
      color: var(--text-muted);
      text-transform: capitalize;
    }

    .referral-amount {
      font-weight: 700;
      color: var(--primary);
    }

    /* Product Grid */
    .product-grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
    }

    .product-card {
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .product-card:active {
      border-color: rgba(74, 222, 128, 0.3);
      background: var(--card-hover);
    }

    .product-emoji {
      font-size: 32px;
      margin-bottom: 8px;
    }

    .product-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .product-price {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .product-points {
      font-size: 12px;
      color: var(--primary);
      font-weight: 600;
    }

    /* Search */
    .search-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(42, 42, 74, 0.5);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px 14px;
      margin-bottom: 16px;
    }

    .search-box svg {
      width: 18px;
      height: 18px;
      color: var(--text-muted);
    }

    .search-box input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: var(--text);
      font-size: 14px;
    }

    .search-box input::placeholder {
      color: var(--text-muted);
    }

    /* Categories */
    .categories {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
      overflow-x: auto;
      scrollbar-width: none;
    }

    .categories::-webkit-scrollbar {
      display: none;
    }

    .category-btn {
      padding: 8px 16px;
      background: rgba(42, 42, 74, 0.5);
      border: 1px solid var(--border);
      border-radius: 999px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 500;
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }

    .category-btn.active {
      background: var(--primary);
      color: var(--bg);
      border-color: var(--primary);
    }

    /* QR Code */
    .qr-container {
      position: relative;
      padding: 20px;
      text-align: center;
    }

    .qr-badge {
      position: absolute;
      top: 8px;
      right: 8px;
      background: var(--primary);
      color: var(--bg);
      padding: 4px 10px;
      border-radius: 999px;
      font-size: 10px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .qr-badge svg {
      width: 12px;
      height: 12px;
    }

    .qr-code {
      width: 144px;
      height: 144px;
      background: var(--text);
      border-radius: 12px;
      padding: 8px;
      margin: 0 auto 16px;
      position: relative;
    }

    .qr-grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      gap: 1px;
      width: 100%;
      height: 100%;
    }

    .qr-cell {
      background: var(--card);
    }

    .qr-cell.filled {
      background: var(--text);
    }

    .qr-center {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 32px;
      height: 32px;
      background: var(--text);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .qr-center svg {
      width: 20px;
      height: 20px;
      color: var(--primary);
    }

    .qr-label {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      font-size: 14px;
      color: var(--text-muted);
    }

    .qr-label svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
    }

    /* Link Copy */
    .link-box {
      display: flex;
      align-items: center;
      gap: 8px;
      background: rgba(42, 42, 74, 0.5);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
    }

    .link-text {
      flex: 1;
      font-size: 12px;
      color: var(--text-muted);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .copy-btn {
      padding: 8px 16px;
      background: var(--primary);
      color: var(--bg);
      border: none;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
      transition: all 0.2s;
    }

    .copy-btn:active {
      transform: scale(0.95);
    }

    .copy-btn svg {
      width: 14px;
      height: 14px;
    }

    /* Rewards */
    .reward-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 12px;
    }

    .reward-icon {
      width: 48px;
      height: 48px;
      background: var(--primary-dim);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .reward-icon svg {
      width: 24px;
      height: 24px;
      color: var(--primary);
    }

    .reward-info {
      flex: 1;
    }

    .reward-name {
      font-weight: 600;
      font-size: 14px;
      margin-bottom: 4px;
    }

    .reward-points {
      font-size: 12px;
      color: var(--primary);
    }

    .claim-btn {
      padding: 8px 16px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
    }

    .claim-btn:not(:disabled) {
      background: var(--primary);
      color: var(--bg);
    }

    .claim-btn:disabled {
      background: rgba(42, 42, 74, 0.5);
      color: var(--text-muted);
      cursor: not-allowed;
    }

    .claim-btn:not(:disabled):active {
      transform: scale(0.95);
    }

    /* Trust Score */
    .trust-score {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }

    .trust-value {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .trust-value span:first-child {
      font-size: 40px;
      font-weight: 700;
      color: var(--primary);
    }

    .trust-value span:last-child {
      font-size: 18px;
      color: var(--text-muted);
    }

    .trust-icon {
      width: 56px;
      height: 56px;
      background: var(--primary-dim);
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .trust-icon svg {
      width: 28px;
      height: 28px;
      color: var(--primary);
    }

    .trust-bar {
      height: 8px;
      background: rgba(42, 42, 74, 0.5);
      border-radius: 999px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .trust-fill {
      height: 100%;
      background: var(--primary);
      border-radius: 999px;
      transition: width 0.5s ease;
    }

    .trust-label {
      display: flex;
      align-items: center;
      gap: 4px;
      font-size: 12px;
      color: var(--primary);
    }

    .trust-label svg {
      width: 12px;
      height: 12px;
    }

    /* Security Item */
    .security-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px;
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 12px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .security-item:active {
      background: var(--card-hover);
    }

    .security-icon {
      width: 40px;
      height: 40px;
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .security-icon.active {
      background: var(--primary-dim);
    }

    .security-icon.active svg {
      color: var(--primary);
    }

    .security-icon:not(.active) {
      background: rgba(42, 42, 74, 0.5);
    }

    .security-icon:not(.active) svg {
      color: var(--text-muted);
    }

    .security-icon svg {
      width: 20px;
      height: 20px;
    }

    .security-info {
      flex: 1;
    }

    .security-title {
      font-weight: 600;
      font-size: 14px;
    }

    .security-desc {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Toggle */
    .toggle {
      width: 48px;
      height: 28px;
      border-radius: 999px;
      padding: 4px;
      cursor: pointer;
      transition: background 0.2s;
    }

    .toggle.on {
      background: var(--primary);
    }

    .toggle.off {
      background: rgba(42, 42, 74, 0.5);
    }

    .toggle-knob {
      width: 20px;
      height: 20px;
      background: var(--text);
      border-radius: 50%;
      transition: transform 0.2s;
    }

    .toggle.on .toggle-knob {
      transform: translateX(20px);
    }

    /* Activity Bars */
    .activity-bars {
      display: flex;
      gap: 2px;
    }

    .activity-bar {
      width: 6px;
      height: 16px;
      background: var(--primary);
      border-radius: 999px;
      animation: pulse 1s ease-in-out infinite;
    }

    .activity-bar:nth-child(2) {
      animation-delay: 0.2s;
    }

    .activity-bar:nth-child(3) {
      animation-delay: 0.4s;
    }

    @keyframes pulse {
      0%, 100% { transform: scaleY(0.5); }
      50% { transform: scaleY(1); }
    }

    /* Alert */
    .alert-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 12px;
      border-radius: 12px;
      margin-bottom: 8px;
    }

    .alert-item.resolved {
      background: rgba(42, 42, 74, 0.2);
      border: 1px solid var(--border);
    }

    .alert-item.unresolved {
      background: var(--danger-dim);
      border: 1px solid rgba(239, 68, 68, 0.3);
    }

    .alert-icon {
      width: 32px;
      height: 32px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .alert-icon.success {
      background: var(--primary-dim);
    }

    .alert-icon.success svg {
      color: var(--primary);
    }

    .alert-icon.danger {
      background: var(--danger-dim);
    }

    .alert-icon.danger svg {
      color: var(--danger);
    }

    .alert-icon svg {
      width: 16px;
      height: 16px;
    }

    .alert-content {
      flex: 1;
    }

    .alert-message {
      font-size: 14px;
    }

    .alert-time {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .resolve-btn {
      background: none;
      border: none;
      color: var(--primary);
      font-size: 12px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Network */
    .network-stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
      margin-bottom: 20px;
    }

    .network-stat {
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 12px;
      text-align: center;
    }

    .network-stat-value {
      font-size: 24px;
      font-weight: 700;
      color: var(--primary);
    }

    .network-stat-label {
      font-size: 10px;
      color: var(--text-muted);
    }

    .network-visual {
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 200px;
      position: relative;
    }

    .network-center {
      width: 56px;
      height: 56px;
      background: var(--primary);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      z-index: 2;
    }

    .network-center svg {
      width: 24px;
      height: 24px;
      color: var(--bg);
    }

    .network-node {
      position: absolute;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 600;
      font-size: 14px;
    }

    .network-node.purchased {
      background: var(--primary-dim);
      border: 2px solid var(--primary);
      color: var(--primary);
    }

    .network-node.clicked {
      background: rgba(42, 42, 74, 0.5);
      border: 2px solid var(--border);
      color: var(--text-muted);
    }

    .network-node.pending {
      background: rgba(251, 191, 36, 0.2);
      border: 2px dashed rgb(251, 191, 36);
      color: rgb(251, 191, 36);
    }

    /* Profile */
    .profile-header {
      text-align: center;
      margin-bottom: 24px;
    }

    .profile-avatar {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, var(--primary-dim) 0%, rgba(74, 222, 128, 0.05) 100%);
      border: 2px solid rgba(74, 222, 128, 0.3);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 12px;
    }

    .profile-avatar svg {
      width: 32px;
      height: 32px;
      color: var(--primary);
    }

    .profile-name {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .profile-member {
      font-size: 14px;
      color: var(--text-muted);
    }

    .profile-stats {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 12px;
      margin-bottom: 24px;
    }

    .profile-stat {
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 16px;
      text-align: center;
    }

    .profile-stat-value {
      font-size: 24px;
      font-weight: 700;
    }

    .profile-stat-value.primary {
      color: var(--primary);
    }

    .profile-stat-label {
      font-size: 12px;
      color: var(--text-muted);
    }

    .menu-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px;
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: all 0.2s;
    }

    .menu-item:active {
      background: var(--card-hover);
      border-color: rgba(74, 222, 128, 0.3);
    }

    .menu-label {
      display: flex;
      align-items: center;
      gap: 8px;
      font-weight: 500;
    }

    .menu-label svg {
      width: 16px;
      height: 16px;
      color: var(--primary);
    }

    .menu-arrow {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
      transform: rotate(180deg);
    }

    /* Scan */
    .scan-area {
      background: rgba(42, 42, 74, 0.3);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      margin-bottom: 20px;
    }

    .scan-frame {
      position: relative;
      width: 200px;
      height: 200px;
      margin: 0 auto;
    }

    .scan-corner {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--primary);
      border-width: 3px;
    }

    .scan-corner.tl {
      top: 0;
      left: 0;
      border-style: solid none none solid;
      border-radius: 8px 0 0 0;
    }

    .scan-corner.tr {
      top: 0;
      right: 0;
      border-style: solid solid none none;
      border-radius: 0 8px 0 0;
    }

    .scan-corner.bl {
      bottom: 0;
      left: 0;
      border-style: none none solid solid;
      border-radius: 0 0 0 8px;
    }

    .scan-corner.br {
      bottom: 0;
      right: 0;
      border-style: none solid solid none;
      border-radius: 0 0 8px 0;
    }

    .scan-line {
      position: absolute;
      left: 12px;
      right: 12px;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--primary), transparent);
      animation: scanMove 2s ease-in-out infinite;
    }

    @keyframes scanMove {
      0% { top: 12px; }
      50% { top: calc(100% - 14px); }
      100% { top: 12px; }
    }

    .scan-instructions {
      text-align: center;
      margin-top: 20px;
    }

    .scan-instructions p {
      font-size: 14px;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .scan-hint {
      font-size: 12px;
      color: var(--text-muted);
    }

    /* Toast */
    .toast {
      position: absolute;
      bottom: 96px;
      left: 16px;
      right: 16px;
      background: var(--card-hover);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 12px 16px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 500;
      text-align: center;
      z-index: 30;
      animation: slideUp 0.3s ease;
    }

    @keyframes slideUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .toast.hidden {
      display: none;
    }

    /* Biometric Modal */
    .modal-overlay {
      position: absolute;
      inset: 0;
      background: rgba(15, 15, 26, 0.8);
      backdrop-filter: blur(8px);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      border-radius: 40px;
    }

    .modal-overlay.hidden {
      display: none;
    }

    .modal-content {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 24px;
      padding: 32px;
      margin: 32px;
      text-align: center;
    }

    .modal-icon {
      width: 80px;
      height: 80px;
      background: rgba(42, 42, 74, 0.5);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 16px;
    }

    .modal-icon.verifying {
      animation: fingerprint 1s ease-in-out infinite;
    }

    .modal-icon.success {
      background: var(--primary-dim);
    }

    @keyframes fingerprint {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .modal-icon svg {
      width: 40px;
      height: 40px;
    }

    .modal-icon.verifying svg {
      color: var(--primary);
    }

    .modal-icon.success svg {
      color: var(--primary);
    }

    .modal-title {
      font-size: 18px;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .modal-text {
      font-size: 14px;
      color: var(--text-muted);
    }

    .section-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .section-title svg {
      width: 16px;
      height: 16px;
      color: var(--text-muted);
    }
  </style>
</head>
<body>
  <div class="glow"></div>

  <div class="logo">
    <div class="logo-icon">
      <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/>
      </svg>

  <div class="phone">

    <div class="status-bar">

        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36a5.389 5.389 0 01-4.4 2.26 5.403 5.403 0 01-3.14-9.8c-.79-.07-1.58-.1-2.36-.1z"/></svg>
        <svg fill="currentColor" viewBox="0 0 24 24"><path d="M17 4h-3V2h-4v2H7v18h10V4z"/></svg>

    <div class="bottom-nav">

          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/></svg>
          <span>Home</span>
        </button>
        <button class="nav-btn" data-screen="products" onclick="navigateTo('products')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
          <span>Products</span>
        </button>
        <button class="scan-btn" onclick="navigateTo('scan')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v1m6 11h2m-6 0h-2v4m0-11v3m0 0h.01M12 12h4.01M16 20h2M4 12h4m12 0h.01M5 8h2a1 1 0 001-1V5a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1zm12 0h2a1 1 0 001-1V5a1 1 0 00-1-1h-2a1 1 0 00-1 1v2a1 1 0 001 1zM5 20h2a1 1 0 001-1v-2a1 1 0 00-1-1H5a1 1 0 00-1 1v2a1 1 0 001 1z"/></svg>
        </button>
        <button class="nav-btn" data-screen="rewards" onclick="navigateTo('rewards')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
          <span>Rewards</span>
        </button>
        <button class="nav-btn" data-screen="profile" onclick="navigateTo('profile')">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          <span>Profile</span>
        </button>
      </div>
    </div>

    <div class="toast hidden" id="toast"></div>

    <div class="modal-overlay hidden" id="modal">
      <div class="modal-content">
        <div class="modal-icon" id="modal-icon">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>
        </div>
        <h3 class="modal-title" id="modal-title">Touch Sensor</h3>
        <p class="modal-text" id="modal-text">Place your finger on the sensor</p>
      </div>
    </div>
  </div>

  <script>
    const state = {
      screen: 'home',
      history: [],
      points: 2450,
      notifications: 3,
      selectedProduct: null,
      copied: false,
      trustScore: 94,
      biometricEnabled: true,
      searchQuery: '',
      category: 'all',
      alerts: [
        { id: 1, message: 'New device login blocked from Bangkok', time: '2 hours ago', resolved: false },
        { id: 2, message: 'Unusual activity pattern detected', time: '1 day ago', resolved: true },
        { id: 3, message: '2FA verification successful', time: '3 days ago', resolved: true },
      ],
      rewards: [
        { id: 1, name: '7-Eleven Voucher', points: 500, claimed: false },
        { id: 2, name: 'Grab Food ฿50', points: 800, claimed: false },
        { id: 3, name: "Lotus's Discount", points: 300, claimed: false },
        { id: 4, name: 'True Money ฿100', points: 1500, claimed: false },
      ],
      referrals: [
        { id: 1, name: 'Som', status: 'purchased', amount: 150 },
        { id: 2, name: 'Nong', status: 'clicked', amount: 0 },
        { id: 3, name: 'Pla', status: 'purchased', amount: 89 },
        { id: 4, name: 'Kai', status: 'pending', amount: 0 },
      ]
    };

    const products = [
      { id: 1, name: 'Snack Box', price: 49, points: 25, category: 'food', emoji: '📦' },
      { id: 2, name: 'Energy Drink', price: 35, points: 18, category: 'drinks', emoji: '⚡' },
      { id: 3, name: 'Instant Noodles', price: 15, points: 8, category: 'food', emoji: '🍜' },
      { id: 4, name: 'Phone Charger', price: 199, points: 100, category: 'electronics', emoji: '🔌' },
      { id: 5, name: 'Coffee 3-in-1', price: 25, points: 12, category: 'drinks', emoji: '☕' },
      { id: 6, name: 'Face Mask', price: 89, points: 45, category: 'health', emoji: '😷' },
    ];

    function navigateTo(screen) {
      if (state.screen !== screen) {
        state.history.push(state.screen);
      }
      state.screen = screen;
      render();
      updateNav();
    }

    function goBack() {
      if (state.history.length > 0) {
        state.screen = state.history.pop();
        render();
        updateNav();
      }
    }

    function updateNav() {
      document.querySelectorAll('.nav-btn').forEach(btn => {
        const screen = btn.dataset.screen;
        const isActive = screen === state.screen || 
          (state.screen === 'share' && screen === 'products') ||
          (state.screen === 'security' && screen === 'profile') ||
          (state.screen === 'network' && screen === 'home');
        btn.classList.toggle('active', isActive);
      });
    }

    function showToast(message) {
      const toast = document.getElementById('toast');
      toast.textContent = message;
      toast.classList.remove('hidden');
      setTimeout(() => toast.classList.add('hidden'), 2000);
    }

    function copyLink() {
      state.copied = true;
      state.points += 10;
      showToast('+10 Points for sharing!');
      render();
      setTimeout(() => { state.copied = false; render(); }, 2000);
    }

    function claimReward(id) {
      const reward = state.rewards.find(r => r.id === id);
      if (reward && !reward.claimed && state.points >= reward.points) {
        reward.claimed = true;
        state.points -= reward.points;
        showToast('Claimed ' + reward.name + '!');
        render();
      }
    }

    function resolveAlert(id) {
      const alert = state.alerts.find(a => a.id === id);
      if (alert) {
        alert.resolved = true;
        state.trustScore = Math.min(100, state.trustScore + 2);
        showToast('Alert resolved');
        render();
      }
    }

    function toggleBiometric() {
      const modal = document.getElementById('modal');
      const icon = document.getElementById('modal-icon');
      const title = document.getElementById('modal-title');
      const text = document.getElementById('modal-text');

      modal.classList.remove('hidden');
      icon.classList.add('verifying');
      icon.classList.remove('success');
      title.textContent = 'Verifying...';
      text.textContent = 'Place your finger on the sensor';
      icon.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>';

      setTimeout(() => {
        icon.classList.remove('verifying');
        icon.classList.add('success');
        title.textContent = 'Verified';
        text.textContent = 'Biometric authentication successful';
        icon.innerHTML = '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>';

        setTimeout(() => {
          modal.classList.add('hidden');
          state.biometricEnabled = !state.biometricEnabled;
          showToast(state.biometricEnabled ? 'Biometric enabled' : 'Biometric disabled');
          render();
        }, 800);
      }, 1500);
    }

    function selectProduct(product) {
      state.selectedProduct = product;
      navigateTo('share');
    }

    function generateQR(seed) {
      const cells = [];
      for (let i = 0; i < 81; i++) {
        const row = Math.floor(i / 9);
        const col = i % 9;
        const isCornerArea = (row < 3 && col < 3) || (row < 3 && col > 5) || (row > 5 && col < 3);
        if (isCornerArea) {
          const isEdge = row === 0 || row === 2 || col === 0 || col === 2 || (row > 5 && (row === 6 || row === 8));
          cells.push(isEdge);
        } else {
          cells.push(((seed * (i + 1) * 17) % 100) > 45);
        }
      }
      return cells;
    }

    function render() {
      const screen = document.getElementById('screen');
      screen.innerHTML = '<div class="screen-content">' + getScreenContent() + '</div>';
    }

    function getScreenContent() {
      switch (state.screen) {
        case 'home': return renderHome();
        case 'products': return renderProducts();
        case 'share': return renderShare();
        case 'rewards': return renderRewards();
        case 'network': return renderNetwork();
        case 'profile': return renderProfile();
        case 'security': return renderSecurity();
        case 'scan': return renderScan();
        default: return renderHome();
      }
    }

    function renderHome() {
      return `
        <div class="header">
          <div>
            <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">Welcome back</p>
            <h1 style="font-size: 20px; font-weight: 700;">CipherShare User</h1>
          </div>
          <button class="back-btn" onclick="state.notifications=0;showToast('Notifications cleared');render();" style="position: relative;">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 17h5l-1.405-1.405A2.032 2.032 0 0118 14.158V11a6.002 6.002 0 00-4-5.659V5a2 2 0 10-4 0v.341C7.67 6.165 6 8.388 6 11v3.159c0 .538-.214 1.055-.595 1.436L4 17h5m6 0v1a3 3 0 11-6 0v-1m6 0H9"/></svg>
            ${state.notifications > 0 ? `<span style="position: absolute; top: -4px; right: -4px; width: 20px; height: 20px; background: var(--primary); border-radius: 50%; font-size: 10px; font-weight: 700; color: var(--bg); display: flex; align-items: center; justify-content: center;">${state.notifications}</span>` : ''}
          </button>
        </div>

        <div class="card card-primary" style="margin-bottom: 20px;">
          <div class="points-card">
            <div class="points-header">
              <div class="points-label">
                <div class="points-icon">
                  <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 10h18M7 15h1m4 0h1m-7 4h12a3 3 0 003-3V8a3 3 0 00-3-3H6a3 3 0 00-3 3v8a3 3 0 003 3z"/></svg>
                </div>
                <span>Total Points</span>
              </div>
              <svg style="width: 20px; height: 20px; color: var(--primary);" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 3v4M3 5h4M6 17v4m-2-2h4m5-16l2.286 6.857L21 12l-5.714 2.143L13 21l-2.286-6.857L5 12l5.714-2.143L13 3z"/></svg>
            </div>
            <p class="points-value">${state.points.toLocaleString()}</p>
            <p class="points-change">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"/></svg>
              +350 this week
            </p>
          </div>
        </div>

        <div class="quick-actions">
          <button class="quick-action" onclick="navigateTo('products')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z"/></svg>
            <span>Products</span>
          </button>
          <button class="quick-action" onclick="navigateTo('rewards')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
            <span>Rewards</span>
          </button>
          <button class="quick-action" onclick="navigateTo('security')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            <span>Security</span>
          </button>
          <button class="quick-action" onclick="navigateTo('network')">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0zm6 3a2 2 0 11-4 0 2 2 0 014 0zM7 10a2 2 0 11-4 0 2 2 0 014 0z"/></svg>

        </div>
      `;

    function renderProducts() {
      const filtered = state.category === 'all' ? products : products.filter(p => p.category === state.category);
      const searched = state.searchQuery ? filtered.filter(p => p.name.toLowerCase().includes(state.searchQuery.toLowerCase())) : filtered;

      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="goBack()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>Products</h2>
          </div>
        </div>

        <div class="search-box">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/></svg>
          <input type="text" placeholder="Search products..." value="${state.searchQuery}" oninput="state.searchQuery=this.value;render();">
        </div>

        <div class="categories">
          ${['all', 'food', 'drinks', 'electronics', 'health'].map(cat => `
            <button class="category-btn ${state.category === cat ? 'active' : ''}" onclick="state.category='${cat}';render();">
              ${cat.charAt(0).toUpperCase() + cat.slice(1)}
            </button>
          `).join('')}
        </div>

        <div class="product-grid">
          ${searched.map(p => `
            <div class="product-card" onclick="selectProduct(${JSON.stringify(p).replace(/"/g, '&quot;')})">
              <div class="product-emoji">${p.emoji}</div>
              <div class="product-name">${p.name}</div>
              <div class="product-price">฿${p.price}</div>
              <div class="product-points">+${p.points} pts</div>
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderShare() {
      const p = state.selectedProduct || products[0];
      const qr = generateQR(p.id);

      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="goBack()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>Share & Earn</h2>
          </div>
        </div>

        <div class="card" style="text-align: center; margin-bottom: 16px;">
          <div style="font-size: 40px; margin-bottom: 8px;">${p.emoji}</div>
          <div style="font-weight: 600; font-size: 18px; margin-bottom: 4px;">${p.name}</div>
          <div style="color: var(--text-muted); font-size: 14px;">฿${p.price}</div>
        </div>

        <div class="card qr-container">
          <div class="qr-badge">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"/></svg>
            Encrypted
          </div>
          <div class="qr-code">
            <div class="qr-grid">
              ${qr.map(filled => `<div class="qr-cell ${filled ? '' : 'filled'}"></div>`).join('')}
            </div>
            <div class="qr-center">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
          </div>
          <div class="qr-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            Anti-fraud protected QR code
          </div>
        </div>

        <div class="link-box" style="margin-bottom: 16px;">
          <span class="link-text">cipher.share/r/${p.name.toLowerCase().replace(/\s/g, '-')}-${p.id}x7k</span>
          <button class="copy-btn" onclick="copyLink()">
            ${state.copied ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/></svg> Copied!' : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 16H6a2 2 0 01-2-2V6a2 2 0 012-2h8a2 2 0 012 2v2m-6 12h8a2 2 0 002-2v-8a2 2 0 00-2-2h-8a2 2 0 00-2 2v8a2 2 0 002 2z"/></svg> Copy'}
          </button>
        </div>

        <div class="card card-primary" style="text-align: center;">
          <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">You'll earn</p>
          <p style="font-size: 28px; font-weight: 700; color: var(--primary);">+${p.points} points</p>
          <p style="font-size: 12px; color: var(--text-muted);">when someone purchases via your link</p>
        </div>
      `;
    }

    function renderRewards() {
      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="goBack()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>Rewards</h2>
          </div>
        </div>

        <div class="card card-primary" style="margin-bottom: 20px;">
          <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">Available Points</p>
          <p style="font-size: 32px; font-weight: 700;">${state.points.toLocaleString()}</p>
        </div>

        <h3 style="font-size: 14px; font-weight: 600; margin-bottom: 12px;">Available Rewards</h3>

        ${state.rewards.map(r => `
          <div class="reward-item">
            <div class="reward-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v13m0-13V6a2 2 0 112 2h-2zm0 0V5.5A2.5 2.5 0 109.5 8H12zm-7 4h14M5 12a2 2 0 110-4h14a2 2 0 110 4M5 12v7a2 2 0 002 2h10a2 2 0 002-2v-7"/></svg>
            </div>
            <div class="reward-info">
              <div class="reward-name">${r.name}</div>
              <div class="reward-points">${r.points} points</div>
            </div>
            <button class="claim-btn" ${r.claimed || state.points < r.points ? 'disabled' : ''} onclick="claimReward(${r.id})">
              ${r.claimed ? 'Claimed' : 'Claim'}
            </button>
          </div>
        `).join('')}
      `;
    }

    function renderNetwork() {
      const purchased = state.referrals.filter(r => r.status === 'purchased').length;
      const total = state.referrals.reduce((sum, r) => sum + r.amount, 0);

      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="goBack()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>My Network</h2>
          </div>
        </div>

        <div class="network-stats">
          <div class="network-stat">
            <div class="network-stat-value">${state.referrals.length}</div>
            <div class="network-stat-label">Referrals</div>
          </div>
          <div class="network-stat">
            <div class="network-stat-value">${purchased}</div>
            <div class="network-stat-label">Converted</div>
          </div>
          <div class="network-stat">
            <div class="network-stat-value">฿${total}</div>
            <div class="network-stat-label">Earned</div>
          </div>
        </div>

        <div class="network-visual">
          <div class="network-center">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          ${state.referrals.map((r, i) => {
            const angle = (i * 90 - 45) * (Math.PI / 180);
            const x = Math.cos(angle) * 70;
            const y = Math.sin(angle) * 70;
            return `<div class="network-node ${r.status}" style="left: calc(50% + ${x}px - 20px); top: calc(50% + ${y}px - 20px);">${r.name.charAt(0)}</div>`;
          }).join('')}
        </div>

        <h3 style="font-size: 14px; font-weight: 600; margin: 20px 0 12px;">All Referrals</h3>

        <div class="referral-list">
          ${state.referrals.map(r => `
            <div class="referral-item">
              <div class="referral-avatar">${r.name.charAt(0)}</div>
              <div class="referral-info">
                <div class="referral-name">${r.name}</div>
                <div class="referral-status">${r.status}</div>
              </div>
              ${r.amount > 0 ? `<div class="referral-amount">+฿${r.amount}</div>` : `<span class="badge ${r.status === 'pending' ? 'badge-primary' : ''}" style="background: ${r.status === 'clicked' ? 'rgba(42, 42, 74, 0.5)' : ''}; color: ${r.status === 'clicked' ? 'var(--text-muted)' : ''}">${r.status}</span>`}
            </div>
          `).join('')}
        </div>
      `;
    }

    function renderProfile() {
      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="goBack()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>Profile</h2>
          </div>
        </div>

        <div class="profile-header">
          <div class="profile-avatar">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
          </div>
          <div class="profile-name">CipherShare User</div>
          <div class="profile-member">Member since 2024</div>
        </div>

        <div class="profile-stats">
          <div class="profile-stat">
            <div class="profile-stat-value primary">${state.points.toLocaleString()}</div>
            <div class="profile-stat-label">Total Points</div>
          </div>
          <div class="profile-stat">
            <div class="profile-stat-value">${state.referrals.length}</div>
            <div class="profile-stat-label">Referrals</div>
          </div>
        </div>

        <div class="menu-item" onclick="navigateTo('security')">
          <span class="menu-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            Security Center
          </span>
          <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </div>

        <div class="menu-item">
          <span class="menu-label">Edit Profile</span>
          <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </div>

        <div class="menu-item">
          <span class="menu-label">Help & Support</span>
          <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </div>

        <div class="menu-item">
          <span class="menu-label">Terms of Service</span>
          <svg class="menu-arrow" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
        </div>
      `;
    }

    function renderSecurity() {
      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="navigateTo('profile')">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>Security Center</h2>
          </div>
        </div>

        <div class="card card-primary" style="margin-bottom: 16px;">
          <div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px;">
            <div>
              <p style="font-size: 14px; color: var(--text-muted); margin-bottom: 4px;">Trust Score</p>
              <div class="trust-value">
                <span>${state.trustScore}</span>
                <span>/100</span>
              </div>
            </div>
            <div class="trust-icon">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            </div>
          </div>
          <div class="trust-bar">
            <div class="trust-fill" style="width: ${state.trustScore}%"></div>
          </div>
          <div class="trust-label">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
            Excellent - Account fully protected
          </div>
        </div>

        <div class="security-item">
          <div class="security-icon active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 18h.01M8 21h8a2 2 0 002-2V5a2 2 0 00-2-2H8a2 2 0 00-2 2v14a2 2 0 002 2z"/></svg>
          </div>
          <div class="security-info">
            <div class="security-title">Device Verified</div>
            <div class="security-desc">iPhone 15 Pro</div>
          </div>
          <span class="badge badge-primary">Trusted</span>
        </div>

        <div class="security-item" onclick="toggleBiometric()">
          <div class="security-icon ${state.biometricEnabled ? 'active' : ''}">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 11c0 3.517-1.009 6.799-2.753 9.571m-3.44-2.04l.054-.09A13.916 13.916 0 008 11a4 4 0 118 0c0 1.017-.07 2.019-.203 3m-2.118 6.844A21.88 21.88 0 0015.171 17m3.839 1.132c.645-2.266.99-4.659.99-7.132A8 8 0 008 4.07M3 15.364c.64-1.319 1-2.8 1-4.364 0-1.457.39-2.823 1.07-4"/></svg>
          </div>
          <div class="security-info">
            <div class="security-title">Biometric Login</div>
            <div class="security-desc">Face ID / Touch ID</div>
          </div>
          <div class="toggle ${state.biometricEnabled ? 'on' : 'off'}">
            <div class="toggle-knob"></div>
          </div>
        </div>

        <div class="security-item">
          <div class="security-icon active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M17.657 16.657L13.414 20.9a1.998 1.998 0 01-2.827 0l-4.244-4.243a8 8 0 1111.314 0z"/><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 11a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
          </div>
          <div class="security-info">
            <div class="security-title">Location Guard</div>
            <div class="security-desc">Bangkok, Thailand</div>
          </div>
          <span class="badge badge-primary">Active</span>
        </div>

        <div class="security-item">
          <div class="security-icon active">
            <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"/></svg>
          </div>
          <div class="security-info">
            <div class="security-title">Anti-Fraud Engine</div>
            <div class="security-desc">Real-time monitoring</div>
          </div>
          <div class="activity-bars">
            <div class="activity-bar"></div>
            <div class="activity-bar"></div>
            <div class="activity-bar"></div>
          </div>
        </div>

        <h3 class="section-title" style="margin-top: 16px;">
          <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>
          Recent Alerts
        </h3>

        ${state.alerts.map(a => `
          <div class="alert-item ${a.resolved ? 'resolved' : 'unresolved'}">
            <div class="alert-icon ${a.resolved ? 'success' : 'danger'}">
              ${a.resolved 
                ? '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>'
                : '<svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/></svg>'
              }
            </div>
            <div class="alert-content">
              <div class="alert-message">${a.message}</div>
              <div class="alert-time">${a.time}</div>
            </div>
            ${!a.resolved ? `<button class="resolve-btn" onclick="resolveAlert(${a.id})">Resolve</button>` : ''}
          </div>
        `).join('')}
      `;
    }

    function renderScan() {
      return `
        <div class="header">
          <div class="header-back">
            <button class="back-btn" onclick="goBack()">
              <svg fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <h2>Scan QR Code</h2>
          </div>
        </div>

        <div class="scan-area">
          <div class="scan-frame">
            <div class="scan-corner tl"></div>
            <div class="scan-corner tr"></div>
            <div class="scan-corner bl"></div>
            <div class="scan-corner br"></div>
            <div class="scan-line"></div>
          </div>
          <div class="scan-instructions">
            <p>Position QR code within the frame</p>
            <p class="scan-hint">Scanning will start automatically</p>
          </div>
        </div>

        <div class="card" style="text-align: center;">
          <div style="margin-bottom: 12px;">
            <svg style="width: 32px; height: 32px; color: var(--primary); margin: 0 auto;" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
          </div>
          <p style="font-weight: 600; margin-bottom: 4px;">Secure Scanning</p>
          <p style="font-size: 12px; color: var(--text-muted);">All QR codes are verified for fraud protection</p>
        </div>
      `;
    }

    // Initialize
    render();
    updateNav();
  </script>
</body>
</html>
